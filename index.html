
<!DOCTYPE html>
<html>
<head>
<title>Cemil Game</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:cyan;
font-size:50px;
}

button{
padding:15px 30px;
font-size:20px;
margin:10px;
background:blue;
color:white;
border:none;
cursor:pointer;
}

canvas{
background:#111;
border:2px solid cyan;
margin-top:20px;
}
</style>

</head>

<body>

<h1>Cemil Game</h1>
<p>Sitede ücretsiz mini oyunlar oynayabilirsiniz</p>

<button onclick="startClick()">Tıklama Oyunu</button>
<button onclick="startSnake()">Yılan Oyunu</button>
<button onclick="startCar()">Araba Oyunu</button>

<h2 id="score"></h2>

<canvas id="game" width="400" height="500"></canvas>

<script>

let canvas=document.getElementById("game")
let ctx=canvas.getContext("2d")
let score=0

function startClick(){
score=0
canvas.onclick=function(){
score++
document.getElementById("score").innerText="Puan: "+score
}
}

function startSnake(){

let snake=[{x:200,y:200}]
let food={x:100,y:100}
let dx=20
let dy=0

document.onkeydown=function(e){
if(e.key=="ArrowUp"){dx=0;dy=-20}
if(e.key=="ArrowDown"){dx=0;dy=20}
if(e.key=="ArrowLeft"){dx=-20;dy=0}
if(e.key=="ArrowRight"){dx=20;dy=0}
}

function draw(){

ctx.clearRect(0,0,400,500)

snake.unshift({x:snake[0].x+dx,y:snake[0].y+dy})

if(snake[0].x==food.x && snake[0].y==food.y){
food.x=Math.floor(Math.random()*20)*20
food.y=Math.floor(Math.random()*20)*20
score++
}else{
snake.pop()
}

ctx.fillStyle="lime"
snake.forEach(s=>ctx.fillRect(s.x,s.y,20,20))

ctx.fillStyle="red"
ctx.fillRect(food.x,food.y,20,20)

document.getElementById("score").innerText="Skor: "+score
}

setInterval(draw,100)
}

function startCar(){

let car={x:180,y:420}
let enemy={x:180,y:0}
score=0

document.onkeydown=function(e){
if(e.key=="ArrowLeft"){car.x-=20}
if(e.key=="ArrowRight"){car.x+=20}
}

function game(){

ctx.clearRect(0,0,400,500)

ctx.fillStyle="blue"
ctx.fillRect(car.x,car.y,40,70)

ctx.fillStyle="red"
ctx.fillRect(enemy.x,enemy.y,40,70)

enemy.y+=5

if(enemy.y>500){
enemy.y=0
enemy.x=Math.random()*360
score++
}

if(car.x<enemy.x+40 && car.x+40>enemy.x && car.y<enemy.y+70 && car.y+70>enemy.y){
alert("Kaza yaptın! Skor: "+score)
enemy.y=0
score=0
}

document.getElementById("score").innerText="Skor: "+score

requestAnimationFrame(game)
}

game()
}

</script>

<p>Yapımcı: İSMAİL EGE OĞUZHAN</p>

</body>
</html>
